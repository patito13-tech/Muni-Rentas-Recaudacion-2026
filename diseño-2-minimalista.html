<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Muni Rentas - Recaudación 2026 | Diseño Minimalista</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      background: #ffffff;
      color: #1f2937;
    }
    header {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      padding: 50px 20px;
      text-align: center;
    }
    header h1 {
      font-size: 2.2em;
      margin-bottom: 8px;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .main {
      background: #f9fafb;
      padding: 35px;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
    }
    .section-title {
      color: #059669;
      font-size: 1.8em;
      margin-bottom: 8px;
    }
    button {
      background: #10b981;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    footer {
      background: #1f2937;
      color: white;
      text-align: center;
      padding: 25px;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <header>
    <h1>🏛️ Muni Rentas - Recaudación 2026</h1>
    <p>Digitalización de liquidaciones municipales</p>
  </header>
  <div class="container">
    <div class="main">
      <h2 class="section-title">Liquidaciones</h2>
      <p>Sistema limpio y minimalista</p>
      <button onclick="alert('Próximamente')">Comenzar</button>
    </div>
  </div>
  <footer>Muni Rentas - Recaudación 2026</footer>
</body>
</html>
