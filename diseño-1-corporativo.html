<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Muni Rentas - Recaudación 2026 | Diseño Corporativo</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    body {
      background: #f5f7fa;
      color: #2c3e50;
    }
    header {
      background: linear-gradient(135deg, #003d82, #0056b3);
      color: white;
      padding: 40px 20px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0, 61, 130, 0.2);
    }
    header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      font-weight: 700;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .main {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }
    .section-title {
      color: #003d82;
      font-size: 2em;
      margin-bottom: 10px;
      border-bottom: 3px solid #ff9500;
      padding-bottom: 15px;
    }
    button {
      background: linear-gradient(135deg, #0056b3, #003d82);
      color: white;
      padding: 14px 28px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover {
      box-shadow: 0 6px 20px rgba(0, 56, 130, 0.3);
    }
    footer {
      background: #003d82;
      color: white;
      text-align: center;
      padding: 30px;
      margin-top: 50px;
    }
  </style>
</head>
<body>
  <header>
    <h1>🏛️ Muni Rentas - Recaudación 2026</h1>
    <p>Digitalización de liquidaciones municipales</p>
  </header>
  <div class="container">
    <div class="main">
      <h2 class="section-title">Liquidaciones SISA</h2>
      <p style="margin-bottom: 20px; color: #666;">Sistema profesional y corporativo con colores azul + naranja</p>
      <button onclick="alert('Diseño Corporativo - Próximamente')">Cargar Sistema</button>
    </div>
  </div>
  <footer>Muni Rentas - Recaudación 2026 | Sistema de apoyo para Rentas y Recaudación Municipal</footer>
</body>
</html>
