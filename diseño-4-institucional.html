<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Muni Rentas - Recaudación 2026 | Diseño Institucional</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Georgia', 'Garamond', serif;
    }
    body {
      background: #f5f3f0;
      color: #1a237e;
    }
    header {
      background: linear-gradient(135deg, #1a237e, #0d47a1);
      color: #ffd700;
      padding: 50px 20px;
      text-align: center;
      border-bottom: 4px solid #ffd700;
      box-shadow: 0 4px 20px rgba(26, 35, 126, 0.2);
    }
    header h1 {
      font-size: 2.8em;
      margin-bottom: 12px;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }
    .container {
      max-width: 1150px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .main {
      background: white;
      padding: 45px;
      border-radius: 4px;
      box-shadow: 0 2px 15px rgba(26, 35, 126, 0.12);
      border-left: 5px solid #1a237e;
    }
    .section-title {
      color: #1a237e;
      font-size: 2em;
      margin-bottom: 10px;
      border-bottom: 3px solid #ffd700;
      padding-bottom: 15px;
      font-weight: 700;
    }
    button {
      background: linear-gradient(135deg, #1a237e, #0d47a1);
      color: #ffd700;
      padding: 14px 28px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
    }
    button:hover {
      box-shadow: 0 4px 15px rgba(26, 35, 126, 0.3);
    }
    footer {
      background: #1a237e;
      color: #ffd700;
      text-align: center;
      padding: 30px;
      margin-top: 50px;
      border-top: 3px solid #ffd700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <header>
    <h1>🏛️ Muni Rentas - Recaudación 2026</h1>
    <p>Digitalización de liquidaciones municipales</p>
  </header>
  <div class="container">
    <div class="main">
      <h2 class="section-title">Liquidaciones SISA</h2>
      <p style="margin-bottom: 20px; color: #555;">Sistema institucional elegante - Azul marino + Dorado clásico</p>
      <button onclick="alert('Diseño Institucional - Próximamente')">Cargar Sistema</button>
    </div>
  </div>
  <footer>Muni Rentas - Recaudación 2026 | Sistema de apoyo para Rentas y Recaudación Municipal</footer>
</body>
</html>
